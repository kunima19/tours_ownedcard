<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>未所持カード</title>
    <style>
        body {
            font-family: "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif;
            background: linear-gradient(to bottom right, #fdfdfd, #f4f6fa);
            padding: 20px;
            color: #333;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            width: 150px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.12);
            text-align: center;
            padding: 10px;
        }
        .card img {
            width: 100%;
            border-radius: 6px;
        }
        .card p {
            margin-top: 6px;
            font-size: 11px;
            line-height: 1.3em;
            white-space: pre-line;
        }
        .filter-box {
            margin-bottom: 15px;
            padding: 15px 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        button {
            margin-right: 8px;
            padding: 5px 10px;
            font-size: 13px;
            background: #ff74b8;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>未所持一覧</h1>

<div class="filter-box">

    <strong>ver絞り込み</strong><br>
    <label><input type="checkbox" class="ver" value="LT"> 1stロケテスト</label>
    <label><input type="checkbox" class="ver" value="LT2"> 2ndロケテスト</label><br>
    <label><input type="checkbox" class="ver" value="1st"> 第1弾</label>
    <label><input type="checkbox" class="ver" value="2nd"><span style="text-decoration: line-through;"> 第2弾</span></label>
    <label><input type="checkbox" class="ver" value="3rd"> 第3弾</label>
    <label><input type="checkbox" class="ver" value="4th"> 第4弾</label>
    <label><input type="checkbox" class="ver" value="5th"> 第5弾</label>
    <br><br>

    <strong>表示切替</strong><br>
    <button id="btnAll">全て表示</button>
    <button id="btnNormal">通常SSRのみ表示</button>
    <button id="btnParallel">パラレルのみ表示</button>

</div>

<div class="card-container" id="cardArea"></div>

<script>
const cards = [
    {no:"IMT-LT-001",name:"アテンダントツアラー",rare:"SSR",ssrType:"SSR-P",ver:"LT",idol:"天海春香"},
    {no:"IMT-LT-002",name:"アテンダントツアラー",rare:"SSR",ssrType:"SSR-N",ver:"LT",idol:"天海春香"},
    {no:"IMT-LT-016",name:"all you've got",rare:"SSR",ssrType:"SSR-N",ver:"LT",idol:"渋谷凛"},

    {no:"IMT-LT2-002",name:"アテンダントツアラー",rare:"SSR",ssrType:"SSR-P",ver:"LT2",idol:"天海春香"},
    {no:"IMT-LT2-003",name:"アテンダントツアラー",rare:"SSR",ssrType:"SSR-P",ver:"LT2",idol:"島村卯月"},

    {no:"IMT-01-005",name:"アテンダントツアラー",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"天道輝"},
    {no:"IMT-01-008",name:"デイアフターデイAMCG",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"天海春香"},
    {no:"IMT-01-009",name:"デイアフターデイAMCG",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"如月千早"},
    {no:"IMT-01-010",name:"デイアフターデイAMCG",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"星井美希"},
    {no:"IMT-01-012",name:"ノーブルプライド",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"天道輝"},
    {no:"IMT-01-013",name:"ノーブルプライド",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"桜庭薫"},
    {no:"IMT-01-014",name:"ノーブルプライド",rare:"SSR",ssrType:"SSR-P",ver:"1st",idol:"柏木翼"},

    //----------//

    {no:"IMT-03-021",name:"rabbit on the moon",rare:"SSR",ssrType:"SSR-P",ver:"3rd",idol:"星井美希"},
    {no:"IMT-03-023",name:"LESSON 1",rare:"SSR",ssrType:"SSR-P",ver:"3rd",idol:"桜庭薫"},

    {no:"IMT-04-025",name:"snow*parade",rare:"SSR",ssrType:"SSR-P",ver:"4th",idol:"真壁瑞希"},
    {no:"IMT-04-026",name:"3,2,1･･･!",rare:"SSR",ssrType:"SSR-N",ver:"4th",idol:"天海春香"},

    {no:"IMT-05-022",name:"小宮果穂、参上！",rare:"SSR",ssrType:"SSR-P",ver:"5th",idol:"小宮果穂"},
    {no:"IMT-05-024",name:"Campus mode!!",rare:"SSR",ssrType:"SSR-P",ver:"5th",idol:"紫雲清夏"},
    {no:"IMT-05-088",name:"ノーブルプライド",rare:"SSR",ssrType:"SSR-P",ver:"5th",idol:"天道輝"},
];

let ssrFilter = null;

function displayCards() {
    const area = document.getElementById("cardArea");
    area.innerHTML = "";

    const verChecks = [...document.querySelectorAll(".ver:checked")].map(c => c.value);

    cards.forEach(card => {

        // verフィルター
        if (verChecks.length > 0 && !verChecks.includes(card.ver)) return;

        // SSRフィルター
        if (ssrFilter !== null) {
            if (card.rare !== "SSR") return;
            if (card.ssrType !== ssrFilter) return;
        }

        const cardDiv = document.createElement("div");
        cardDiv.className = "card";

        const img = document.createElement("img");
        img.src = `img/${card.rare}.png`;

        const name = document.createElement("p");
        name.innerText = `${card.no}\n${card.name}\n（${card.idol}）`;

        cardDiv.appendChild(img);
        cardDiv.appendChild(name);
        area.appendChild(cardDiv);
    });
}

// ボタン処理
document.getElementById("btnAll").addEventListener("click", () => {
    ssrFilter = null;
    displayCards();
});
document.getElementById("btnNormal").addEventListener("click", () => {
    ssrFilter = "SSR-N";
    displayCards();
});
document.getElementById("btnParallel").addEventListener("click", () => {
    ssrFilter = "SSR-P";
    displayCards();
});

// ver変更
document.querySelectorAll(".ver").forEach(c =>
    c.addEventListener("change", displayCards)
);

// 初期表示
displayCards();
</script>

</body>
</html>
